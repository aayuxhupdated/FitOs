  .page{padding:16px 16px 100px;max-width:480px;margin:0 auto;}

  .select{background:#0D0D14;border:1px solid #1E1E2E;border-radius:12px;padding:11px 14px;color:#E8E8F0;font-size:15px;width:100%;outline:none;cursor:pointer;}
  .btn{background:linear-gradient(135deg,#6C63FF,#8B5CF6);border:none;border-radius:14px;padding:13px 20px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-top:10px;letter-spacing:0.2px;}
  .btn-green{background:linear-gradient(135deg,#22C55E,#16A34A);}
  .btn-orange{background:linear-gradient(135deg,#F97316,#EA580C);}
  .btn-sm{background:#6C63FF;border:none;border-radius:10px;padding:7px 14px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;}
  .btn-ghost{background:#1E1E2E;border:1px solid #2E2E3E;border-radius:10px;padding:7px 14px;color:#E8E8F0;font-size:12px;font-weight:600;cursor:pointer;}
  .tag{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;display:inline-block;}
  .divider{border:none;border-top:1px solid #1E1E2E;margin:12px 0;}
  .row{display:flex;align-items:center;justify-content:space-between;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .flex-gap{display:flex;gap:8px;flex-wrap:wrap;}
  .progress-bar{height:6px;background:#1E1E2E;border-radius:3px;overflow:hidden;margin-top:6px;}
  .progress-fill{height:100%;border-radius:3px;transition:width 0.5s ease;}
  /* Nav */
  #nav{position:fixed;bottom:0;left:0;right:0;background:#111118ee;border-top:1px solid #1E1E2E;display:flex;z-index:200;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding-bottom:env(safe-area-inset-bottom);}
  .nav-btn{flex:1;padding:10px 0 10px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:#6B6B80;}
  .nav-btn.active{color:#6C63FF;}
  .nav-icon{font-size:20px;}
  .nav-label{font-size:9px;font-weight:700;letter-spacing:0.5px;}
  /* Header */
  #header{background:#111118ee;border-bottom:1px solid #1E1E2E;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
  .logo{font-size:22px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#6C63FF,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  /* Chat */
  .chat-bubble-ai{background:#16161F;border:1px solid #1E1E2E;border-radius:4px 18px 18px 18px;padding:12px 15px;font-size:14px;line-height:1.65;max-width:85%;white-space:pre-wrap;}
  .chat-bubble-user{background:#6C63FF;border-radius:18px 4px 18px 18px;padding:12px 15px;font-size:14px;line-height:1.65;max-width:85%;}
  .chat-msg{display:flex;gap:8px;margin-bottom:14px;}
  .chat-msg.user{flex-direction:row-reverse;}
  /* Typing dots */
  .dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:#6C63FF;margin:0 2px;animation:bounce 1.2s infinite;}
  .dots span:nth-child(2){animation-delay:0.2s;}
  .dots span:nth-child(3){animation-delay:0.4s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}
  /* Pill chips */
  .chip{background:#1A1A2E;border:1px solid #2E2E3E;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;color:#A0A0B8;cursor:pointer;white-space:nowrap;flex-shrink:0;}
  .chip.active{background:#6C63FF22;border-color:#6C63FF;color:#6C63FF;}
  /* Modal */
  .modal-bg{position:fixed;inset:0;background:#000000CC;z-index:300;display:flex;align-items:flex-end;}
  .modal{background:#111118;border-radius:24px 24px 0 0;padding:20px 16px;padding-bottom:calc(20px + env(safe-area-inset-bottom));width:100%;max-height:85vh;overflow-y:auto;}
  .modal-handle{width:40px;height:4px;background:#2E2E3E;border-radius:2px;margin:0 auto 16px;}
  /* Toast */
  .toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#22C55E;color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:400;opacity:0;transition:opacity 0.3s;}
  .toast.show{opacity:1;}
  /* Gradient text */
  .grad{background:linear-gradient(135deg,#6C63FF,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  /* Hide pages */
  .page-section{display:none;}
  .page-section.active{display:block;}

function load(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

};

function fmtDate(d = new Date()) {
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
function todayDay() {
  return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date().getDay()];
}
function todayPlan() {
  return WEEK_PLAN.find(w => w.day === todayDay()) || WEEK_PLAN[0];
}
function greet() {
  const h = new Date().getHours();
  return h < 12 ? 'Good Morning' : h < 17 ? 'Good Afternoon' : 'Good Evening';
}
function todayWorkout() { return state.workoutLog.filter(e => e.date === fmtDate()); }
function todayDiet() { return state.dietLog.filter(m => m.date === fmtDate()); }
function totalCal() { return todayDiet().reduce((s,m) => s+(parseInt(m.cal)||0), 0); }
function totalPro() { return todayDiet().reduce((s,m) => s+(parseInt(m.pro)||0), 0); }
function latestMetric() { return state.metrics[state.metrics.length-1]; }
function pct(v,g) { return Math.min(Math.round(v/g*100), 100); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── RENDER HELPERS ─────────────────────────────────────────────────────────

function progressBar(val, goal, color) {
  const p = pct(val, goal);
  return `<div class="progress-bar"><div class="progress-fill" style="width:${p}%;background:${color};"></div></div>`;
}

function tagEl(text, color) {
  return `<span class="tag" style="background:${color}22;color:${color};border:1px solid ${color}44;">${text}</span>`;
}

// ─── TAB SWITCHER ───────────────────────────────────────────────────────────

function switchTab(tab) {
  document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pg-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  state.activeTab = tab;
  renderTab(tab);
  window.scrollTo(0,0);
}

function renderTab(tab) {
  if (tab === 'dashboard') renderDashboard();
  else if (tab === 'workout') renderWorkout();
  else if (tab === 'diet') renderDiet();
  else if (tab === 'metrics') renderMetrics();
  else if (tab === 'sleep') renderSleep();
  else if (tab === 'ai') renderAI();
}

function setDCat(c) {
  dState.category = c;
  dState.mealName = '';
  dState.cal = ''; dState.pro = ''; dState.carb = ''; dState.fat = '';
  renderDiet();
}

function prefillMeal(name) {
  const meals = DIET_DB[dState.category] || [];
  const found = meals.find(m=>m.name===name);
  if (found) {
    dState.mealName = found.name;
    dState.cal = found.cal;
    dState.pro = found.pro;
    dState.carb = found.carb;
    dState.fat = found.fat;
    ['cal','pro','carb','fat'].forEach(k => {
      const el = document.getElementById('d-'+k);
      if(el) el.value = found[k];
    });
    const cn = document.getElementById('d-custom-name');
    if(cn) cn.value = found.name;
  }
}

function logMeal() {
  const nameEl = document.getElementById('d-custom-name');
  const name = (nameEl?.value || dState.mealName).trim();
  if (!name) { showToast('⚠️ Enter a meal name!'); return; }
  const entry = {
    id:Date.now(), date:fmtDate(), category:dState.category,
    name,
    cal: document.getElementById('d-cal')?.value || dState.cal,
    pro: document.getElementById('d-pro')?.value || dState.pro,
    carb: document.getElementById('d-carb')?.value || dState.carb,
    fat: document.getElementById('d-fat')?.value || dState.fat,
  };
  state.dietLog.push(entry);
  dState = {...dState, mealName:'', cal:'', pro:'', carb:'', fat:''};
  saveState();
  showToast('✅ Meal logged!');
  renderDiet();
}

function deleteMeal(id) {
  state.dietLog = state.dietLog.filter(m=>m.id!==id);
  saveState();
  renderDiet();
}

          return `<div class="card-sm" style="margin-bottom:0;">
            <div style="font-size:11px;color:#6B6B80;font-weight:600;">${m.label}</div>
            <div style="font-size:24px;font-weight:800;color:${m.color};margin-top:4px;">${m.val||'—'}<span style="font-size:11px;color:#6B6B80;">${m.unit}</span></div>
            <div style="font-size:10px;color:#6B6B80;margin-top:2px;">Goal: ${m.target}</div>
            ${d?`<div style="font-size:11px;color:${isGood?'#22C55E':'#EF4444'};margin-top:3px;">${parseFloat(d)>0?'+':''}${d}${m.unit} vs last</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- Update Form -->
    ${mFormOpen ? `
    <div class="card">
      <div class="section-title">Log New Measurements</div>
      <div class="grid2">
        ${[['Weight (kg)','weight'],['Body Fat (%)','bodyFat'],['Chest (cm)','chest'],['Waist (cm)','waist'],['Hips (cm)','hips'],['Arms (cm)','arms'],['Thighs (cm)','thighs']].map(([lbl,key])=>`
          <div>
            <div style="font-size:11px;color:#6B6B80;margin-bottom:4px;">${lbl}</div>
            <input class="input" type="number" placeholder="${lbl}" value="${mState[key]}" oninput="mState.${key}=this.value" inputmode="decimal"/>
          </div>`).join('')}
      </div>
      <button class="btn btn-green" onclick="saveMetric()" style="margin-top:14px;">Save Measurements</button>
    </div>` : ''}

    <!-- History -->
    ${state.metrics.length > 1 ? `
    <div class="card">
      <div class="section-title">Weight History</div>
      ${state.metrics.slice().reverse().map((m,i)=>`
        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1E1E2E;">
          <div style="font-size:13px;color:#6B6B80;">${m.date}</div>
          <div style="font-weight:700;">
            <span style="color:#6C63FF;">${m.weight}kg</span>
            ${m.bodyFat?`<span style="color:#6B6B80;font-size:12px;"> · ${m.bodyFat}% BF</span>`:''}
            ${m.waist?`<span style="color:#6B6B80;font-size:12px;"> · ${m.waist}cm waist</span>`:''}
          </div>
        </div>`).join('')}
    </div>` : ''}

    <!-- Recomp Targets -->
    <div class="card">
      <div class="section-title">Recomposition Roadmap</div>
      ${[
        {phase:'Phase 1 (Weeks 1-8)',goal:'Build workout habit, lose 2-3kg fat',focus:'Consistency + diet'},
        {phase:'Phase 2 (Weeks 9-16)',goal:'Visible muscle definition, -5kg weight',focus:'Progressive overload'},
        {phase:'Phase 3 (Weeks 17-24)',goal:'Lean physique, 15-17% body fat',focus:'Intensity & nutrition precision'},
      ].map((p,i)=>`
        <div style="padding:12px 0;border-bottom:1px solid #1E1E2E;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
            <div style="width:24px;height:24px;background:#6C63FF;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;">${i+1}</div>
            <div style="font-weight:700;font-size:14px;">${p.phase}</div>
          </div>
          <div style="font-size:13px;color:#E8E8F0;margin-bottom:2px;padding-left:32px;">${p.goal}</div>
          <div style="font-size:11px;color:#6C63FF;padding-left:32px;">Focus: ${p.focus}</div>
        </div>`).join('')}
    </div>
  `;
}

function toggleMetricForm() {
  mFormOpen = !mFormOpen;
  renderMetrics();
}

function saveMetric() {
  if (!mState.weight) { showToast('⚠️ Enter weight at minimum!'); return; }
  state.metrics.push({...mState, date:fmtDate(), id:Date.now()});
  mState = {weight:'',bodyFat:'',chest:'',waist:'',hips:'',arms:'',thighs:''};
  mFormOpen = false;
  saveState();
  showToast('✅ Measurements saved!');
  renderMetrics();
}

// ─── SLEEP ──────────────────────────────────────────────────────────────────

let sState = {hours:'',quality:'Good',bedtime:'',wakeup:'',notes:''};

function renderSleep() {
  const logs = state.sleepLog;
  const avg = logs.length ? (logs.reduce((s,l)=>s+parseFloat(l.hours||0),0)/logs.length).toFixed(1) : '—';
  const goodNights = logs.filter(l=>parseFloat(l.hours)>=7).length;

  document.getElementById('sleep-content').innerHTML = `
    <div style="font-size:22px;font-weight:800;margin-bottom:4px;">Sleep & Recovery 🌙</div>
    <div style="color:#6B6B80;font-size:13px;margin-bottom:20px;">Muscle grows while you sleep</div>

    <!-- Stats -->
    <div class="card">
      <div class="section-title">Sleep Overview</div>
      <div class="grid3">
        ${[
          {label:'Avg Sleep',val:avg+'h',color:'#818CF8'},
          {label:'Good Nights',val:goodNights,color:'#22C55E'},
          {label:'Target',val:'8h',color:'#6C63FF'},
        ].map(s=>`
          <div style="text-align:center;">
            <div style="font-size:22px;font-weight:800;color:${s.color};">${s.val}</div>
            <div style="font-size:10px;color:#6B6B80;margin-top:4px;">${s.label}</div>
          </div>`).join('')}
      </div>
    </div>

    <!-- Log Sleep -->
    <div class="card">
      <div class="section-title">Log Sleep</div>
      <div class="grid2" style="margin-bottom:10px;">
        <div>
          <div style="font-size:11px;color:#6B6B80;margin-bottom:4px;">Hours Slept</div>
          <input class="input" type="number" placeholder="8" value="${sState.hours}" oninput="sState.hours=this.value" inputmode="decimal"/>
        </div>
        <div>
          <div style="font-size:11px;color:#6B6B80;margin-bottom:4px;">Quality</div>
          <select class="select" onchange="sState.quality=this.value">
            ${['Excellent','Good','Fair','Poor'].map(q=>`<option ${sState.quality===q?'selected':''}>${q}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="grid2" style="margin-bottom:10px;">
        <div>
          <div style="font-size:11px;color:#6B6B80;margin-bottom:4px;">Bed Time</div>
          <input class="input" type="time" value="${sState.bedtime}" onchange="sState.bedtime=this.value"/>
        </div>
        <div>
          <div style="font-size:11px;color:#6B6B80;margin-bottom:4px;">Wake Up</div>
          <input class="input" type="time" value="${sState.wakeup}" onchange="sState.wakeup=this.value"/>
        </div>
      </div>
      <input class="input" placeholder="Notes (dreams, disturbances...)" value="${sState.notes}" oninput="sState.notes=this.value" style="margin-bottom:10px;"/>
      <button class="btn" style="background:linear-gradient(135deg,#6366F1,#8B5CF6);" onclick="logSleep()">+ Log Sleep</button>
    </div>

    <!-- Log History -->
    ${logs.length > 0 ? `
    <div class="card">
      <div class="section-title">Sleep Log</div>
      ${logs.slice().reverse().map(entry=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1E1E2E;">
          <div>
            <div style="font-weight:700;font-size:14px;">${entry.date}</div>
            <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;">
              ${tagEl(entry.quality, entry.quality==='Excellent'?'#22C55E':entry.quality==='Good'?'#6C63FF':entry.quality==='Fair'?'#EAB308':'#EF4444')}
              ${entry.bedtime&&entry.wakeup?`<span style="font-size:11px;color:#6B6B80;align-self:center;">${entry.bedtime} → ${entry.wakeup}</span>`:''}
            </div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:26px;font-weight:800;color:${parseFloat(entry.hours)>=7?'#22C55E':'#EF4444'};">${entry.hours}h</div>
            <button onclick="deleteSleep(${entry.id})" style="background:none;border:none;color:#EF4444;font-size:13px;cursor:pointer;">✕</button>
          </div>
        </div>`).join('')}
    </div>` : ''}

    <!-- Recovery Protocol -->
    <div class="card">
      <div class="section-title">Recovery Protocol</div>
      ${[
        {icon:'😴',tip:'Sleep 7-9 hours. Growth hormone (which builds muscle) peaks during deep sleep between 11pm-3am.'},
        {icon:'🧘',tip:'Stretch 10 min post-workout. Focus on the muscles trained. Reduces DOMS by ~30%.'},
        {icon:'🍌',tip:'Post-workout window: eat carbs + protein within 45 min. Speeds muscle repair significantly.'},
        {icon:'💆',tip:'Active recovery on Sunday: light walk, yoga, foam rolling. Promotes blood flow without fatigue.'},
        {icon:'📵',tip:'No screens 1 hour before bed. Blue light suppresses melatonin by up to 50%.'},
        {icon:'🌡️',tip:'Keep room cool (18-20°C). Body temperature drop signals deeper, more restorative sleep.'},
        {icon:'☕',tip:'No caffeine after 2pm. Caffeine half-life is 5-6 hours — it disrupts sleep architecture.'},
        {icon:'💧',tip:'Stay hydrated through the day but reduce intake 2h before bed to avoid midnight waking.'},
      ].map(r=>`
        <div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #1E1E2E;">
          <span style="font-size:22px;flex-shrink:0;">${r.icon}</span>
          <span style="font-size:13px;line-height:1.55;">${r.tip}</span>
        </div>`).join('')}
    </div>
  `;
}

function logSleep() {
  if (!sState.hours) { showToast('⚠️ Enter hours slept!'); return; }
  state.sleepLog.push({...sState, id:Date.now(), date:fmtDate()});
  sState = {hours:'',quality:'Good',bedtime:'',wakeup:'',notes:''};
  saveState();
  showToast('✅ Sleep logged!');
  renderSleep();
}

function deleteSleep(id) {
  state.sleepLog = state.sleepLog.filter(s=>s.id!==id);
  saveState();
  renderSleep();
}

// ─── AI COACH ───────────────────────────────────────────────────────────────

let aiLoading = false;

function renderAI() {
  const plan = todayPlan();
  document.getElementById('ai-content').innerHTML = `
    <div style="font-size:22px;font-weight:800;margin-bottom:4px;">AI Coach 🤖</div>
    <div style="color:#6B6B80;font-size:13px;margin-bottom:16px;">Powered by Claude · Knows your full profile</div>

    <!-- Quick Prompts -->
    <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;margin-bottom:4px;">
      ${QUICK_PROMPTS.map(p=>`<button class="chip" onclick="usePrompt('${p.replace(/'/g,"\\'")}'">${p}</button>`).join('')}
    </div>

    <!-- Chat Window -->
    <div id="chat-window" class="card" style="padding:14px;max-height:420px;overflow-y:auto;margin-bottom:0;">
      ${state.aiChat.map(msg=>`
        <div class="chat-msg ${msg.role==='user'?'user':''}">
          ${msg.role==='ai'?'<span style="font-size:22px;flex-shrink:0;align-self:flex-start;">🤖</span>':''}
          <div class="${msg.role==='ai'?'chat-bubble-ai':'chat-bubble-user'}">${escHtml(msg.text)}</div>
        </div>`).join('')}
      ${aiLoading?`<div class="chat-msg"><span style="font-size:22px;">🤖</span><div class="chat-bubble-ai"><div class="dots"><span></span><span></span><span></span></div></div></div>`:''}
      <div id="chat-end"></div>
    </div>

    <!-- Input Bar -->
    <div style="display:flex;gap:8px;padding:12px 0;position:sticky;bottom:80px;background:#0A0A0F;">
      <input class="input" id="chat-input" placeholder="Ask your coach anything..." style="flex:1;"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"
        autocomplete="off" autocorrect="off" autocapitalize="sentences"/>
      <button onclick="sendMsg()" style="background:linear-gradient(135deg,#6C63FF,#8B5CF6);border:none;border-radius:12px;padding:11px 18px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;">Send</button>
    </div>

    <!-- Clear Chat -->
    <button onclick="clearChat()" class="btn-ghost" style="width:100%;margin-top:4px;margin-bottom:20px;">🗑 Clear Chat History</button>

    <!-- Static Tips -->
    <div class="card">
      <div class="section-title">Smart Insights For You</div>
      ${[
        {icon:'🎯',tip:'Progressive overload is non-negotiable. Add 1-2 reps or 2.5kg every week to every exercise.'},
        {icon:'🥗',tip:'Protein target: 150g/day. With vegetarian diet, combine multiple sources every meal.'},
        {icon:'⏰',tip:'Train at consistent times. Your body adapts to a schedule, improving performance.'},
        {icon:'📸',tip:'Take weekly progress photos in the same light and pose. Scale weight lies — photos don\'t.'},
        {icon:'🧠',tip:'Muscle memory is real. Consistency for 8 weeks > perfection for 3 weeks.'},
        {icon:'🔥',tip:'NEAT (daily walking, standing, fidgeting) burns more calories than gym for most beginners.'},
      ].map(t=>`
        <div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #1E1E2E;">
          <span style="font-size:20px;flex-shrink:0;">${t.icon}</span>
          <span style="font-size:13px;line-height:1.55;">${t.tip}</span>
        </div>`).join('')}
    </div>
  `;

  scrollChatBottom();
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br/>');
}

function scrollChatBottom() {
  setTimeout(() => {
    const el = document.getElementById('chat-end');
    if(el) el.scrollIntoView({behavior:'smooth'});
  }, 100);
}

function usePrompt(p) {
  const inp = document.getElementById('chat-input');
  if(inp) { inp.value = p; inp.focus(); }
}

function clearChat() {
  state.aiChat = [{role:'ai',text:"Chat cleared. I still know your full profile:\n• Goal: Recomposition (fat loss + muscle)\n• Vegetarian, Beginner, 80-100kg, 6-7 days/week\n\nWhat would you like to work on?"}];
  saveState();
  renderAI();
}

async function sendMsg() {
  const inp = document.getElementById('chat-input');
  const txt = inp?.value?.trim();
  if (!txt || aiLoading) return;
  inp.value = '';
  state.aiChat.push({role:'user', text:txt});
  aiLoading = true;
  renderAI();

  const plan = todayPlan();
  const systemPrompt = `You are FitOS AI Coach — an elite personal fitness coach and nutritionist. Here is the user's complete profile:

PROFILE:
- Primary Goal: Body Recomposition (lose fat + build muscle simultaneously)
- Experience Level: Beginner (0-6 months)
- Body Weight: 80-100kg range
- Training Frequency: 6-7 days per week
- Diet Type: Vegetarian (eggs & dairy allowed, no meat/fish)

TODAY'S DATA:
- Workout Focus: ${plan.focus} (${plan.type} day)
- Calories logged: ${totalCal()} kcal (goal: 2000 kcal)
- Protein logged: ${totalPro()}g (goal: 150g)
- Water intake: ${state.water.count * 250}ml
- Exercises logged today: ${todayWorkout().length}
- Meals logged today: ${todayDiet().length}

COACHING STYLE:
- Be direct, specific, and actionable
- Use real numbers (grams, reps, sets, percentages)
- Reference their vegetarian diet when relevant
- Acknowledge their beginner level but don't be condescending
- Give 2-4 short paragraphs OR bullet points
- No fluff, no generic advice
- Encourage but be honest about what works`;

  try {
    const messages = state.aiChat.slice(-20).map(m => ({
      role: m.role === 'ai' ? 'assistant' : 'user',
      content: m.text
    }));

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        system: systemPrompt,
        messages,
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || "Sorry, I couldn't process that. Please try again.";
    state.aiChat.push({role:'ai', text:reply});
  } catch(e) {
    state.aiChat.push({role:'ai', text:"Connection error. Make sure you're online and try again."});
  }

  aiLoading = false;
  saveState();
  renderAI();
}

// ─── INIT ───────────────────────────────────────────────────────────────────

renderDashboard();
</script>
</body>
</html>
